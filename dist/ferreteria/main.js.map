<div class="catalog">
    <div class="catalog-header">
        <div>
            <h3>Catálogo de productos</h3>
            <p>Catálogo de productos disponibles para la venta</p>
        </div>
        <div class="header-buttons">
            <button mat-raised-button color="primary">
                Agregar producto
                <i class="material-icons">add</i>
            </button>
            <button mat-raised-button color="accent">
                Descargar CSV
                <i class="material-icons">file_download</i>
            </button>
        </div>        
    </div>

    <div class="catalog-alerts">
        <div class="info-card">
            <div class="d-flex flex-row align-items-center gap-2">
                <p style="color: grey;">Total de productos</p>
                <i class="material-icons">inventory</i>
            </div>
            <p>100</p>
        </div>
        <div class="low-stock-card">
            <div class="d-flex flex-row align-items-center gap-2">
                <p style="color: grey;">Productos con stock bajo</p>
                <i class="material-icons">trending_down</i>
            </div>
            <p>10</p>
        </div>
        <div class="out-of-stock-card">
            <div class="d-flex flex-row align-items-center gap-2">
                <p style="color: grey;">Productos sin stock</p>
                <i class="material-icons">error</i>
                
            </div>
            <p>10</p>
        </div>
        <div class="inventory-value-card">
            <div class="d-flex flex-row align-items-center">
                <p style="color: grey;">Valor del inventario</p>
                <i class="material-icons">attach_money</i>
            </div>
            <p>$100,000</p>
        </div>
    </div>

    <div class="catalog-table">
        <div class="catalog-table-header">
            <div class="catalog-table-filters">
                <mat-form-field>
                    <mat-label>Buscar</mat-label>
                    <input matInput type="text">
                </mat-form-field>

                <mat-form-field>
                    <mat-label>Categoría</mat-label>
                    <mat-select>
                        <mat-option value="all">Todos</mat-option>
                        <mat-option value="plomeria">Plomería</mat-option>
                        <mat-option value="electricidad">Electricidad</mat-option>
                        <mat-option value="pintura">Pintura</mat-option>
                    </mat-select>
                </mat-form-field>
            </div>
        </div>
    </div>
</div>
